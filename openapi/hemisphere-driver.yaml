openapi: 3.1.0
info:
  title: Eugene Plexus — hemisphere-driver
  version: 0.1.0
  summary: The interface every hemisphere adapter implements.
  description: |
    A `hemisphere-driver` instance wraps exactly one model backend
    (Anthropic API, OpenAI API, Claude Code CLI, Codex CLI, OpenAI-compatible
    HTTP for Ollama/vLLM/LM Studio). The orchestrator runs *two* instances
    side-by-side as the bicameral pair — typically configured with different
    backends so the hemispheres genuinely disagree.

    All operations are stateless: the orchestrator owns conversation state
    and passes the full prompt every call. Streaming uses Server-Sent
    Events; non-streaming returns a single JSON body.

    ## Safe mode

    The driver honors the watchdog's safe-mode env var:
    `EUGENE_PLEXUS_HD_SAFE_MODE=1` at startup makes the driver ignore
    its persisted config file and boot from built-in defaults. This is
    the recovery flow when a config edit breaks startup — the operator
    can still reach `/v1/config` to fix the persisted file, then
    restart without the env var. While safe mode is active,
    `/v1/generate` returns 503 (no engine is configured), but
    `PATCH /v1/config` writes to the on-disk config normally.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  contact:
    name: Eugene Plexus
    url: https://github.com/eugene-plexus

servers:
  - url: http://{host}:{port}
    description: Default LAN deployment (mDNS-discovered or config-overridden).
    variables:
      host:
        default: localhost
      port:
        default: '8081'

tags:
  - name: inference
    description: Model invocation.
  - name: config
    description: |
      Remote-editable configuration. Every Eugene Plexus component
      implements the same config trio (`GET /v1/config`,
      `GET /v1/config/schema`, `PATCH /v1/config`) so a single UI can
      manage all components without per-component code.
  - name: admin
    description: Inspect and manage the running driver process.
  - name: meta
    description: Driver metadata and health.

paths:

  /v1/generate:
    post:
      tags: [inference]
      operationId: generate
      summary: Run inference on the configured backend.
      description: |
        Single-turn request/response. The orchestrator builds the full prompt
        (system, conversation history, current user turn, NT-conditioning
        prefix) and the driver passes it through to the backend. The driver
        does not own conversation memory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Generation completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: 'components/common.yaml#/components/responses/Problem'
        '500':
          $ref: 'components/common.yaml#/components/responses/Problem'
        '502':
          description: Upstream model backend error.
          content:
            application/problem+json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Problem'

  /v1/generate/stream:
    post:
      tags: [inference]
      operationId: generateStream
      summary: Run inference with token-streamed output.
      description: |
        Same request shape as `POST /v1/generate`, but the response is a
        Server-Sent Events stream. Events:

        - `event: token` — `data` is a JSON `{"text": "..."}` chunk
        - `event: done`  — `data` is the final `GenerateResponse` JSON
        - `event: error` — `data` is a `Problem` JSON

        Backends that don't support native streaming (some CLI subprocess
        adapters) MAY emit the entire response as a single `token` event
        followed by `done`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                description: Newline-delimited SSE events; see operation description.
        '400':
          $ref: 'components/common.yaml#/components/responses/Problem'
        '500':
          $ref: 'components/common.yaml#/components/responses/Problem'

  /v1/info:
    get:
      tags: [meta]
      operationId: info
      summary: Report which backend and model this driver is configured to use.
      description: |
        Used by the orchestrator at startup to log the bicameral pairing
        ("left=claude-opus-4-7, right=gpt-5") and by the UI to label
        hemisphere outputs.
      responses:
        '200':
          description: Driver metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverInfo'

  /v1/config:
    get:
      tags: [config]
      operationId: getConfig
      summary: Read the driver's current effective configuration.
      description: |
        Returns every config field's currently effective value. Values
        of fields with `sensitive: true` (e.g. API keys) are redacted
        as the literal string `"<redacted>"`.

        ## Auth note (v0.1)

        Eugene Plexus v0.1 ships with no application-level
        authentication. Deployment assumption: behind a Tailscale
        tailnet (or equivalent network boundary). **Anyone reachable
        on the network can read and modify this driver's config.**
        Auth lands in v0.2.
      responses:
        '200':
          description: Current config.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigDocument'
    patch:
      tags: [config]
      operationId: updateConfig
      summary: Partial update of the driver's configuration.
      description: |
        Accepts a partial map of `key -> new-value` pairs. Each key is
        validated against its `ConfigField` definition. Validation
        errors are reported per-key without aborting the whole
        request — valid changes are applied, invalid ones are
        rejected and surfaced in the response.

        Some fields require a process restart to take effect (see
        `ConfigField.requiresRestart`). The response indicates whether
        a restart is needed and which keys are queued.

        ## Auth note (v0.1)

        Same caveat as `GET /v1/config`: in v0.1, anyone on the network
        can change driver config. Auth lands in v0.2.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/common.yaml#/components/schemas/ConfigUpdateRequest'
      responses:
        '200':
          description: Update outcome (may include per-field rejections).
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigUpdateResult'
        '400':
          $ref: 'components/common.yaml#/components/responses/Problem'

  /v1/config/schema:
    get:
      tags: [config]
      operationId: getConfigSchema
      summary: UI-renderable description of every editable config field.
      description: |
        Returns a `ConfigSchema` listing every config field this driver
        accepts, with type, default, validation hints, and UI metadata
        (label, description, category, sensitive flag, restart-required
        flag). UIs use this to render a generic config editor without
        driver-specific code.
      responses:
        '200':
          description: Config schema.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigSchema'

  /v1/config/test:
    post:
      tags: [config]
      operationId: testConfig
      summary: Test the effective config without committing it.
      description: |
        Builds a temporary adapter from the saved config merged with the
        optional `overrides`, runs a minimal `generate()` round-trip
        (single user message), and reports success / failure / latency.
        The override values are NOT persisted — `PATCH /v1/config` is
        still required to commit them. Use this from the UI's "Test
        Connection" button so the operator can verify a new API key,
        URL, or model identifier before saving.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: 'components/common.yaml#/components/schemas/ConfigTestRequest'
      responses:
        '200':
          description: Test result. Returned for both success and failure cases.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigTestResult'

  /v1/admin/restart:
    post:
      tags: [admin]
      operationId: restart
      summary: Schedule a process restart so `requiresRestart` config takes effect.
      description: |
        Some config keys (`port`, `provider`, `modelId`, etc.) carry
        `requiresRestart: true` because the driver only reads them at
        startup. Calling this endpoint tells the driver to exit shortly
        after responding; an external supervisor (systemd, docker,
        deploy launcher) brings it back up with the new config in
        effect. The endpoint returns *before* the exit so the HTTP
        response has time to flush.

        v0.1 personal-use installations without a supervisor will
        require a manual relaunch. The UI should make this clear in the
        confirmation dialog.

        ## Auth note (v0.1)

        Unauthenticated, same as the rest of the v0.1 admin surface
        (assumed Tailscale tailnet). Auth lands in v0.2.
      responses:
        '202':
          description: Restart scheduled.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/RestartResult'

  /healthz:
    get:
      tags: [meta]
      operationId: healthz
      summary: Liveness / readiness probe.
      description: |
        Returns ok if the driver process is running and the configured
        backend is reachable (a cheap probe — typically a cached result
        from the last successful call, refreshed on a timer).
      responses:
        '200':
          description: Healthy.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Health'
        '503':
          description: Backend unreachable or driver not ready.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Health'

components:

  schemas:

    GenerateRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          description: |
            Full prompt as an ordered conversation. The orchestrator is
            responsible for inserting any NT-conditioning system message,
            persona, etc. The driver does not modify this.
          items:
            $ref: 'components/common.yaml#/components/schemas/Message'
        ntState:
          $ref: 'components/common.yaml#/components/schemas/NTState'
        passIndex:
          type: integer
          minimum: 0
          description: |
            Zero-based bicameral pass index. The driver itself does not
            condition on this; it's logged for observability so a UI can
            tell which pass produced which hemisphere output.
        maxTokens:
          type: integer
          minimum: 1
          description: |
            Maximum output tokens. Backend-clamped. Owned by the caller
            (typically the orchestrator) — the driver does not apply a
            local default. Adapters whose backends don't expose this
            knob (e.g. agentic CLIs) silently ignore it.
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
          description: |
            Sampling temperature. Backend-clamped. Owned by the caller
            (typically the orchestrator, where it will eventually be
            modulated by the NT system) — the driver does not apply a
            local default. Adapters whose backends don't expose this
            knob (e.g. agentic CLIs) silently ignore it.
        stop:
          type: array
          items:
            type: string
          description: Optional stop sequences.
        requestId:
          type: string
          format: uuid
          description: Caller-supplied id for log correlation. Echoed in the response.

    GenerateResponse:
      type: object
      required:
        - content
        - finishReason
      properties:
        content:
          type: string
          description: The generated assistant text.
        finishReason:
          type: string
          enum:
            - stop          # natural end of generation
            - length        # hit max tokens
            - stop_sequence # matched a `stop` value
            - error         # truncated due to backend error
        usage:
          $ref: '#/components/schemas/Usage'
        requestId:
          type: string
          format: uuid
        backend:
          $ref: 'components/common.yaml#/components/schemas/BackendKind'
        modelId:
          type: string
          description: Backend-specific model identifier (e.g. `"claude-opus-4-7"`).
        latencyMs:
          type: integer
          description: End-to-end driver-side latency in milliseconds.

    Usage:
      type: object
      description: Token accounting. Some backends (CLI subprocess) may report nulls.
      properties:
        promptTokens:
          type: integer
          minimum: 0
        completionTokens:
          type: integer
          minimum: 0
        totalTokens:
          type: integer
          minimum: 0

    DriverInfo:
      type: object
      description: |
        Driver self-description. Driver does not know its position in
        any topology — identity (the operator-supplied name used for UI
        labelling and message stamping) lives on the orchestrator's
        `drivers` config and is never sourced from here.
      required:
        - backend
      properties:
        backend:
          $ref: 'components/common.yaml#/components/schemas/BackendKind'
        provider:
          type: string
          description: |
            Operator-friendly provider key from the driver's
            registry (e.g. `"openai"`, `"xai"`, `"openrouter"`,
            `"claude_subscription"`). Reflects which subscription /
            service this driver is wrapping — `backend` reflects the
            *protocol* underneath, which can be shared across many
            providers (e.g. xAI, OpenRouter, Ollama all report
            `backend: openai_compat_http`). Optional; omitted when
            the driver is in degraded mode and never finished
            constructing.
        modelId:
          type: string
          description: |
            Backend-specific model identifier (e.g. `"claude-opus-4-7"`).
            Optional — omitted when the driver is configured to use the
            adapter's built-in default rather than pinning a specific model.
        capabilities:
          type: object
          description: Optional backend capabilities the orchestrator may key off.
          properties:
            streaming:
              type: boolean
              description: Whether `/v1/generate/stream` emits true incremental tokens.
            maxContextTokens:
              type: integer
              minimum: 0
        version:
          type: string
          description: hemisphere-driver semver.
