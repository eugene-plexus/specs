openapi: 3.1.0
info:
  title: Eugene Plexus — memory
  version: 0.2.0-draft
  summary: Conversation history storage and per-person retrieval.
  description: |
    The memory component stores Eugene's conversational past and
    supports retrieval. Anatomically: the hippocampus — the brain's
    episodic-memory consolidation hub.

    ## v0.2 additions

    * **Person-keyed memory.** Every entry carries a `personId`
      (defined by the identity component) alongside `conversationId`.
      This unlocks per-person context: the orchestrator pulls
      "recent turns with this person" before each chat turn so
      Eugene speaks differently to different people.
    * **Pluggable backends** (Hermes-style). The memory component's
      HTTP surface is the long-term contract; internally a backend
      registry chooses storage. v0.2 ships `local_sqlite` only
      (SQLite + sentence-transformers embeddings + kNN). Future
      adapters (`mem0`, `holographic` HRR, `hindsight` graph,
      `obsidian` vault, etc.) land in v0.3+ as drop-in additions
      with no spec changes here.
    * **Reactive search.** `POST /v1/memory/search` exposes
      similarity-based retrieval. The orchestrator's topic-shift
      detector (v0.3) calls this when the current conversation
      references something outside recent history; v0.2 ships the
      endpoint so the wire shape is stable.
    * **Per-person retrieval endpoints**:
      `GET /v1/memory/persons/{personId}/recent` returns raw recent
      turns for the relationship-summary path; v0.3 adds the
      synthesized-summary endpoint.

    The v0.1 conversation endpoints continue to work; the v0.2
    additions sit alongside them.

    ## Safe mode

    Memory honors the watchdog's safe-mode env var:
    `EUGENE_PLEXUS_MEM_SAFE_MODE=1` at startup makes memory ignore its
    persisted config file and boot from built-in defaults. This is the
    recovery flow when a config edit breaks startup — the operator can
    still reach `/v1/config` to fix the persisted file, then restart
    without the env var. While safe mode is active, the
    `/v1/conversations` endpoints continue to work using in-memory
    storage only (the v0.1 stub behavior); persistent backends, when
    they land in v0.2+, will return 503 for write operations until
    safe mode is cleared.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  contact:
    name: Eugene Plexus
    url: https://github.com/eugene-plexus

servers:
  - url: http://{host}:{port}
    description: Default LAN deployment.
    variables:
      host:
        default: localhost
      port:
        default: '8082'

security:
  - bearerAuth: []

tags:
  - name: conversations
    description: Per-conversation message storage.
  - name: persons
    description: |
      (v0.2) Per-person retrieval. Memory is keyed by
      `(personId, conversationId)`; these endpoints fetch by
      personId so the orchestrator can build per-person prompt
      context.
  - name: search
    description: |
      (v0.2) Reactive similarity search. Backend-defined scoring
      (cosine similarity for `local_sqlite`).
  - name: config
    description: |
      Remote-editable configuration. Every Eugene Plexus component
      implements the same config trio (`GET /v1/config`,
      `GET /v1/config/schema`, `PATCH /v1/config`) so a single UI can
      manage all components without per-component code.
  - name: meta
    description: Health and version.

paths:

  /v1/conversations:
    post:
      tags: [conversations]
      operationId: createConversation
      summary: Create a new (empty) conversation and return its id.
      responses:
        '201':
          description: Conversation created.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Conversation'
        '500':
          $ref: 'components/common.yaml#/components/responses/Problem'

  /v1/conversations/{conversationId}:
    parameters:
      - in: path
        name: conversationId
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [conversations]
      operationId: getConversation
      summary: Fetch the full message history of a conversation.
      responses:
        '200':
          description: The conversation.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Conversation'
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'
    delete:
      tags: [conversations]
      operationId: deleteConversation
      summary: Permanently remove a conversation and its messages.
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'

  /v1/conversations/{conversationId}/messages:
    parameters:
      - in: path
        name: conversationId
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [conversations]
      operationId: appendMessage
      summary: Append a message to a conversation.
      description: |
        (v0.2) The request body's `Message` may be wrapped in a
        broader entry shape carrying `personId` and NT snapshot.
        For backward compatibility, posting a bare `Message`
        continues to work; the memory component will associate it
        with the conversation's primary person.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: 'components/common.yaml#/components/schemas/Message'
                - $ref: 'components/common.yaml#/components/schemas/MemoryEntry'
      responses:
        '201':
          description: Appended.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/MemoryEntry'
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'

  # -------- v0.2: per-person retrieval --------

  /v1/memory/persons/{personId}/recent:
    parameters:
      - in: path
        name: personId
        required: true
        schema:
          type: string
          format: uuid
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - in: query
        name: conversationId
        required: false
        schema:
          type: string
          format: uuid
        description: |
          Optionally restrict to a single conversation. Omit to
          pull recent entries with this person across all
          conversations.
    get:
      tags: [persons]
      operationId: getPersonRecent
      summary: Recent memory entries involving a specific person.
      description: |
        Returns raw recent entries with the given person, newest
        first. Used by the orchestrator to build relationship
        context for hemisphere prompts (v0.2's skip-extraction
        approach to relationship summaries).
      responses:
        '200':
          description: Recent entries.
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: 'components/common.yaml#/components/schemas/MemoryEntry'
                  personId:
                    type: string
                    format: uuid
                  turnCount:
                    type: integer
                    minimum: 0
                    description: |
                      Total turns ever recorded with this person
                      (not limited by `limit`). Surfaced for UI
                      "you've talked N times" displays.
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'

  # -------- v0.2: reactive search --------

  /v1/memory/search:
    post:
      tags: [search]
      operationId: searchMemory
      summary: Similarity-based memory search.
      description: |
        Embeds the query (via the configured embedding source) and
        returns the top-K most similar entries. The orchestrator's
        topic-shift detector (v0.3) calls this when the current
        conversation references something outside recent history;
        the endpoint ships in v0.2 so the wire shape is stable.

        Backend-defined scoring scale. `local_sqlite` uses cosine
        similarity in [0, 1].
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/common.yaml#/components/schemas/MemorySearchRequest'
      responses:
        '200':
          description: Matched entries, ranked.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/MemorySearchResult'
        '503':
          description: |
            Embedding source unreachable (e.g. `embedding: api`
            with the vendor down, or the local model file
            missing). Memory keeps accepting writes; only search
            is affected.
          content:
            application/problem+json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Problem'

  /v1/config:
    get:
      tags: [config]
      operationId: getConfig
      summary: Read the memory component's current effective configuration.
      description: |
        Returns every config field's currently effective value. Values
        of fields with `sensitive: true` are redacted as the literal
        string `"<redacted>"`.

        ## Auth note (v0.1)

        Eugene Plexus v0.1 ships with no application-level
        authentication. Deployment assumption: behind a Tailscale
        tailnet (or equivalent network boundary). **Anyone reachable
        on the network can read and modify the memory component's
        config.** Auth lands in v0.2.
      responses:
        '200':
          description: Current config.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigDocument'
    patch:
      tags: [config]
      operationId: updateConfig
      summary: Partial update of the memory component's configuration.
      description: |
        Accepts a partial map of `key -> new-value` pairs. Each key is
        validated against its `ConfigField` definition. Validation
        errors are reported per-key without aborting the whole
        request — valid changes are applied, invalid ones are
        rejected and surfaced in the response.

        Some fields require a process restart to take effect (see
        `ConfigField.requiresRestart`). The response indicates whether
        a restart is needed and which keys are queued.

        ## Auth note (v0.1)

        Same caveat as `GET /v1/config`: in v0.1, anyone on the network
        can change memory-component config. Auth lands in v0.2.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/common.yaml#/components/schemas/ConfigUpdateRequest'
      responses:
        '200':
          description: Update outcome (may include per-field rejections).
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigUpdateResult'
        '400':
          $ref: 'components/common.yaml#/components/responses/Problem'

  /v1/config/schema:
    get:
      tags: [config]
      operationId: getConfigSchema
      summary: UI-renderable description of every editable config field.
      description: |
        Returns a `ConfigSchema` listing every config field the memory
        component accepts, with type, default, validation hints, and
        UI metadata (label, description, category, sensitive flag,
        restart-required flag). UIs use this to render a generic
        config editor without component-specific code.
      responses:
        '200':
          description: Config schema.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigSchema'

  /v1/config/test:
    post:
      tags: [config]
      operationId: testConfig
      summary: Test the effective config without committing it.
      description: |
        v0.1's in-process backend always succeeds — the endpoint exists
        for protocol uniformity so the UI can hit `/v1/config/test` on
        every component without per-component conditionals. Future
        durable backends (DB, Redis, vector store) will exercise the
        real connection here.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: 'components/common.yaml#/components/schemas/ConfigTestRequest'
      responses:
        '200':
          description: Test result. Returned for both success and failure cases.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigTestResult'

  /healthz:
    get:
      tags: [meta]
      operationId: healthz
      summary: Liveness / readiness probe.
      security: []
      responses:
        '200':
          description: Healthy.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Health'
        '503':
          description: Storage backend unreachable.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Health'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer session token issued by the watchdog. Component-to-
        component calls use service tokens threaded via env var at
        spawn time.
