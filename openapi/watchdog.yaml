openapi: 3.1.0
info:
  title: Eugene Plexus — watchdog
  version: 0.2.0-draft
  summary: Process supervisor, UI host, auth root, and master-key holder.
  description: |
    The watchdog is the outermost process of an Eugene Plexus install —
    the "medulla" in the consciousness analogy. Its jobs:

      1. Spawn and supervise the body components (orchestrator,
         hemisphere drivers, memory, identity, connector) declared in
         its topology config. When a spawned child exits, the watchdog
         respawns it. Children marked `safeMode: true` are launched
         with the `EUGENE_PLEXUS_<KIND>_SAFE_MODE=1` env var so they
         boot from defaults without reading their own config file.

      2. Serve the UI's static assets at the root path so an operator's
         browser has a single, stable address to point at — typically
         `http://localhost:8079`. The UI proxies API calls through the
         watchdog to the orchestrator and other components.

      3. Expose its own configuration and topology over HTTP so the UI
         (or a CLI client) can edit the install's shape without
         touching files on disk.

      4. (v0.2) **Hold the install's trust root.** The operator's
         passphrase, set in the first-run wizard, derives the master
         key that encrypts API keys on disk. The watchdog also issues
         UI session tokens after passphrase login, and threads
         per-component service tokens + the master key to spawned
         children via env var at startup.

      5. (v0.2) **Surface a pending identity-links badge** so the
         operator sees when unknown platform users (Discord, Slack,
         etc.) are waiting for approval. Counts live on the identity
         component; the watchdog's surface exposes a single GET so
         the UI doesn't need to talk to identity for the badge.

    The watchdog does **not** think. It does not participate in the
    bicameral loop, has no NT state, and consumes no LLM tokens. Per
    `project_supervisor_as_interoception`: process health is
    interoceptive sensory data, and the natural place to react to it
    is the orchestrator's NT system. v0.2's watchdog is still a
    transitional concession; v0.3+ moves the richer supervision logic
    into the orchestrator.

    ## v0.2 security model

    The wizard sets a passphrase at install. The watchdog derives a
    master key from it via Argon2id and uses that for two purposes:

      * **At-rest encryption** of `sensitive` config fields on each
        component. The master key is threaded to spawned children
        via env var (`EUGENE_PLEXUS_<KIND>_MASTER_KEY`, base64);
        children decrypt at engine construction time.
      * **UI session auth.** `POST /v1/auth/login` accepts the
        passphrase, bcrypt-compares, and issues a `SessionToken`.
        Every UI proxy request thereafter presents the token as
        `Authorization: Bearer <token>`.

    Two `securityMode` options the operator picks in the wizard:

      * `prompt_on_startup` — master key in memory only; passphrase
        required at every watchdog start. Power-outage Eugene stays
        offline until the operator types the passphrase.
      * `os_keyring` — master key in OS Credential Manager / Keychain /
        Secret Service. Auto-unlocked when the operator's OS session
        is active. More convenient; weaker security boundary.

    Component-internal calls (orchestrator → driver, etc.) use
    per-component service tokens. Same `Authorization: Bearer ...`
    shape, different audience claim, rotates on each watchdog
    restart. The Tailscale tailnet remains the network boundary
    (the v0.2 auth layer sits on top, doesn't replace it).
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  contact:
    name: Eugene Plexus
    url: https://github.com/eugene-plexus

servers:
  - url: http://{host}:{port}
    description: Default loopback deployment. Port is fixed in v0.1 so the UI ships with a known target.
    variables:
      host:
        default: localhost
      port:
        default: '8079'

security:
  - bearerAuth: []

tags:
  - name: auth
    description: |
      (v0.2) Operator passphrase login → session token. Trust root
      for the install.
  - name: components
    description: |
      Topology and lifecycle of the supervised body components. A
      "component" is an orchestrator / hemisphere-driver / memory /
      identity / connector entry the watchdog has been told to spawn
      or watch.
  - name: pending-links
    description: |
      (v0.2) Notification surface for the pending-identity-links
      queue maintained by the identity component. Watchdog exposes
      a count + thin pass-through for the UI badge.
  - name: config
    description: |
      Remote-editable watchdog settings — UI preferences (theme, font
      size), the first-run wizard's completion flag, and `securityMode`.
      Topology lives under `/v1/components`, not here, so editing UI
      prefs can never accidentally restructure the install.
  - name: meta
    description: Health and version.

paths:

  # -------- v0.2: auth --------

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Exchange the operator's passphrase for a session token.
      security: []
      description: |
        Bcrypt-compares the supplied passphrase against the hash set
        during the first-run wizard. On success, returns a
        `SessionToken` the UI presents on every subsequent request.

        Rate-limited per source IP. After 5 failed attempts within
        60 seconds, the endpoint returns 429 and refuses further
        attempts from that source for 60 seconds. (No lockout of the
        legitimate operator — they'll just have to wait.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/common.yaml#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Logged in.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/AuthLoginResponse'
        '401':
          description: Wrong passphrase.
          content:
            application/problem+json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Problem'
        '429':
          description: Rate-limited.
          content:
            application/problem+json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Problem'

  /v1/auth/sessions/current:
    delete:
      tags: [auth]
      operationId: logout
      summary: Invalidate the current session token.
      description: |
        The token presented in `Authorization` is added to the
        watchdog's revocation list. UI uses this for explicit
        logout; expired sessions are cleaned up server-side
        without an explicit call.
      responses:
        '204':
          description: Logged out.
        '401':
          $ref: 'components/common.yaml#/components/responses/Problem'

  # -------- v0.2: pending identity links badge --------

  /v1/pending-links:
    get:
      tags: [pending-links]
      operationId: getPendingLinksSummary
      summary: |
        Summary of pending identity links for the UI's notification
        badge.
      description: |
        Returns a count and the most recent N entries. Avoids forcing
        the UI to talk directly to the identity component for the
        navigation badge; the full pending-links queue is still
        managed by the identity component
        (`GET /v1/identity/links/pending` etc.).
      parameters:
        - in: query
          name: previewLimit
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 20
            default: 3
      responses:
        '200':
          description: Summary.
          content:
            application/json:
              schema:
                type: object
                required: [count, preview]
                properties:
                  count:
                    type: integer
                    minimum: 0
                    description: Total pending links awaiting operator action.
                  preview:
                    type: array
                    items:
                      $ref: 'components/common.yaml#/components/schemas/PendingIdentityLink'

  /v1/components:
    get:
      tags: [components]
      operationId: listComponents
      summary: List supervised components with their declared topology and live status.
      description: |
        Returns one entry per component the watchdog knows about,
        combining the declarative topology (what the operator asked
        for) with operational state (what the watchdog observes
        right now).
      responses:
        '200':
          description: Component list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentList'
    post:
      tags: [components]
      operationId: createComponent
      summary: Add a new component to the topology.
      description: |
        Used by the first-run wizard's "+ Add another driver" flow and
        by the post-setup Components tab. The watchdog scaffolds the
        component's own config file at `spawn.configFile` if it doesn't
        exist, then begins supervising. For a `remote` entry no file is
        scaffolded — the watchdog only monitors reachability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentEntry'
      responses:
        '201':
          description: Component added; supervision started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Component'
        '400':
          $ref: 'components/common.yaml#/components/responses/Problem'
        '409':
          description: A component with this name already exists.
          content:
            application/problem+json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Problem'

  /v1/components/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema:
          type: string
        description: Operator-supplied component name (e.g. `left`, `right`, `orchestrator`).
    get:
      tags: [components]
      operationId: getComponent
      summary: Read one component's topology entry plus current status.
      responses:
        '200':
          description: Component details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Component'
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'
    patch:
      tags: [components]
      operationId: updateComponent
      summary: Modify a component's topology entry.
      description: |
        Partial update. Changes that affect the running process
        (spawn.configFile, url's port, safeMode) trigger a restart of
        that component once the patch is applied — the watchdog's
        respawn loop sees the new desired state and reconciles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentEntry'
      responses:
        '200':
          description: Updated component.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Component'
        '400':
          $ref: 'components/common.yaml#/components/responses/Problem'
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'
    delete:
      tags: [components]
      operationId: deleteComponent
      summary: Remove a component from the topology.
      description: |
        SIGTERMs the spawned process (if local) and removes the entry
        from `watchdog.yaml`. The component's own config file is left
        on disk so re-adding by the same name picks up where it left
        off.
      responses:
        '204':
          description: Component removed.
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'

  /v1/components/{name}/restart:
    parameters:
      - in: path
        name: name
        required: true
        schema:
          type: string
    post:
      tags: [components]
      operationId: restartComponent
      summary: Restart one supervised component.
      description: |
        For a spawned component the watchdog SIGTERMs it (with a brief
        timeout, then SIGKILL) and respawns with the current desired
        state — picking up any config changes made via PATCH. The first-
        run wizard's "Start" step calls this once per component to
        flip them out of safe mode after their real config is in place.

        For a `remote` component this returns `409 Conflict`: the
        watchdog cannot restart something it does not own.
      responses:
        '202':
          description: Restart scheduled.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/RestartResult'
        '404':
          $ref: 'components/common.yaml#/components/responses/Problem'
        '409':
          description: Component is remote and cannot be restarted by the watchdog.
          content:
            application/problem+json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Problem'

  /v1/config:
    get:
      tags: [config]
      operationId: getConfig
      summary: Read the watchdog's UI preferences and first-run state.
      description: |
        Returns the watchdog's settings that are NOT topology — UI
        preferences (theme, font size, future displayName, future
        connectors) and `firstRunComplete`. Topology lives under
        `/v1/components`. This split prevents accidental topology
        changes when an operator edits UI prefs.
      responses:
        '200':
          description: Current config.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigDocument'
    patch:
      tags: [config]
      operationId: updateConfig
      summary: Partial update of UI preferences and setup state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'components/common.yaml#/components/schemas/ConfigUpdateRequest'
      responses:
        '200':
          description: Update outcome.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigUpdateResult'
        '400':
          $ref: 'components/common.yaml#/components/responses/Problem'

  /v1/config/schema:
    get:
      tags: [config]
      operationId: getConfigSchema
      summary: UI-renderable description of every editable watchdog config field.
      responses:
        '200':
          description: Config schema.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/ConfigSchema'

  /healthz:
    get:
      tags: [meta]
      operationId: healthz
      summary: Liveness / readiness probe.
      security: []
      description: |
        The watchdog is healthy if its own HTTP server is up and at
        least one supervised component is reachable. A watchdog that
        cannot reach any of its children stays up (so config endpoints
        remain editable) but reports `degraded`.
      responses:
        '200':
          description: Healthy.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Health'
        '503':
          description: All supervised components unreachable.
          content:
            application/json:
              schema:
                $ref: 'components/common.yaml#/components/schemas/Health'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Bearer session token. Issued via `POST /v1/auth/login`
        after operator passphrase entry. Component-internal calls
        present service tokens threaded via env var at spawn time.

  schemas:

    ComponentList:
      type: object
      required:
        - components
      properties:
        components:
          type: array
          description: |
            Components in the order they were configured. The first-run
            wizard fills this in; later editing happens via the
            Components tab.
          items:
            $ref: '#/components/schemas/Component'

    Component:
      type: object
      description: |
        Combined declarative + operational view of one supervised
        component. The declarative half (`name`, `kind`, `url`,
        `spawn`, `safeMode`) is what's persisted to `watchdog.yaml`.
        The operational half (`status`, `lastRestart`, `lastError`,
        `pid`) is observed at runtime and not persisted.
      required:
        - name
        - kind
        - url
        - status
      properties:
        name:
          type: string
          description: Operator-supplied label, also used in the orchestrator's `drivers` list.
        kind:
          $ref: '#/components/schemas/ComponentKind'
        url:
          type: string
          format: uri
          description: |
            Canonical address. For spawned components the watchdog
            parses the port out of this URL and passes it via env var
            (`EUGENE_PLEXUS_<KIND>_BIND_PORT`); for remote components
            this is what the watchdog probes.
        spawn:
          $ref: '#/components/schemas/SpawnConfig'
          description: |
            Present iff this component runs locally under watchdog
            supervision. Absence means it's remote (the watchdog only
            monitors reachability).
        safeMode:
          type: boolean
          default: false
          description: |
            When true the watchdog launches the spawned component with
            `EUGENE_PLEXUS_<KIND>_SAFE_MODE=1`, telling it to ignore its
            own config file and boot from defaults. Used to recover
            from a config that breaks startup. Ignored for remote
            components.
        status:
          $ref: '#/components/schemas/ComponentStatus'
        pid:
          type: integer
          description: Operating-system process id. Set only for spawned, currently-running components.
        lastRestart:
          type: string
          format: date-time
          description: When the watchdog last started or restarted this component.
        lastError:
          type: string
          description: |
            Most recent error observed for this component. Reset to null
            on successful restart. Useful for surfacing why a component
            keeps crashing in the UI's Components tab.

    ComponentEntry:
      type: object
      description: |
        Declarative half of a Component, used for create / update
        request bodies. Status fields are server-owned and excluded.
      required:
        - name
        - kind
        - url
      properties:
        name:
          type: string
        kind:
          $ref: '#/components/schemas/ComponentKind'
        url:
          type: string
          format: uri
        spawn:
          $ref: '#/components/schemas/SpawnConfig'
        safeMode:
          type: boolean
          default: false

    ComponentKind:
      type: string
      enum:
        - orchestrator
        - hemisphere-driver
        - memory
        - identity
        - connector
      description: |
        Which Eugene Plexus component class this entry represents. The
        watchdog's spawn registry maps each kind to a launch command.
        v0.1 covered three body parts (orchestrator, hemisphere-driver,
        memory). v0.2 adds `identity` (the Default Mode Network — see
        `openapi/identity.yaml`) and `connector` (external sense
        organs — see `openapi/connector.yaml`).

    SpawnConfig:
      type: object
      required:
        - configFile
      properties:
        configFile:
          type: string
          description: |
            Absolute path to the component's own config file. The
            watchdog passes this to the component via its
            kind-specific env var
            (`EUGENE_PLEXUS_<KIND>_CONFIG_FILE`) at spawn time.
        env:
          type: object
          additionalProperties:
            type: string
          description: |
            Optional extra environment variables to pass to the
            spawned process. Reserved for advanced operators; the
            wizard never sets this.

    ComponentStatus:
      type: string
      enum:
        - starting
        - running
        - safe_mode
        - exited
        - crashed
        - unreachable
      description: |
        Current operational state.

        * `starting` — watchdog has spawned the process but it has
          not yet answered `/healthz`.
        * `running` — process is up and `/healthz` is healthy.
        * `safe_mode` — process is up but launched with
          `SAFE_MODE=1`; will refuse to do useful work until the
          operator fixes its config and clears the safe-mode flag.
        * `exited` — process exited cleanly and the watchdog is in
          the middle of respawning it (transient state).
        * `crashed` — process has exited non-zero repeatedly and the
          watchdog has given up auto-restarting it. Operator must
          restart it manually after fixing the cause.
        * `unreachable` — for remote components, the watchdog can't
          reach the URL. For spawned components this state is not
          used (use `crashed` or `exited` instead).
